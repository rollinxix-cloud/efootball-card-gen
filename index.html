<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Epic Card Engine</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="app-container">
        <h1>eFootball Epic Card Engine</h1>
        
        <div class="controls">
            <input type="text" id="nameInput" placeholder="Player Name" oninput="updateCard()">
            <input type="text" id="posInput" placeholder="Position (e.g., LWF, CF, RWF)" oninput="updateCard()">
            <input type="number" id="ratingInput" placeholder="Overall Rating (e.g., 110)" oninput="updateCard()">
            <input type="text" id="yearInput" placeholder="Season/Year (e.g., 2014/15)" oninput="updateCard()">
            
            <label class="control-label">Upload Player Cutout</label>
            <input type="file" id="imageLoader" accept="image/*" onchange="handleImageUpload(event)">
            
            <button onclick="downloadCard()">Export Epic Card</button>
        </div>

        <!-- The Re-engineered Card Layout -->
        <div class="card" id="card">
            <!-- Advanced Sci-Fi Tech Effects Layer -->
            <div class="cyber-grid"></div>
            <div class="glow-flare"></div>
            
            <!-- Dynamic Player Profile -->
            <img id="cardPlayerImg" class="player-graphic" src="" alt="">

            <!-- Floating Top Interface Elements -->
            <div class="top-meta">
                <div class="rating-group">
                    <div id="cardRating">110</div>
                    <div id="cardPos">CF</div>
                </div>
            </div>
            
            <!-- Lower Typography Layout -->
            <div class="card-details">
                <div class="season-year" id="cardYear">2014/15</div>
                <div class="player-name" id="cardName">CRISTIANO RONALDO</div>
            </div>

            <!-- Authentic Tech Bottom Podium Base -->
            <div class="podium-base">
                <div class="podium-hardware">
                    <div class="efootball-badge">e</div>
                    <div class="stars-row">⭐⭐⭐⭐⭐</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
