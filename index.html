<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball 2026 Card Generator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Image downloader library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="app-container">
        <h1>eFootball 2026 Card Creator</h1>
        
        <div class="controls">
            <input type="text" id="nameInput" placeholder="Manager / Gamer Name" oninput="updateCard()">
            <input type="text" id="squadInput" placeholder="Squad Name (e.g., Barca Hub)" oninput="updateCard()">
            
            <label style="color: #aaa; font-size: 12px; margin-bottom: -5px;">Team Playstyle</label>
            <select id="playstyleInput" onchange="updateCard()">
                <option value="QUICK COUNTER">Quick Counter</option>
                <option value="POSSESSION GAME">Possession Game</option>
                <option value="LONG BALL COUNTER">Long Ball Counter</option>
                <option value="OUT WIDE">Out Wide</option>
            </select>
            
            <input type="number" id="ratingInput" placeholder="Team Rating (e.g., 102)" oninput="updateCard()">
            <button onclick="downloadCard()">Download Card</button>
        </div>

        <!-- Real eFootball 2026 Themed Card Layout -->
        <div class="card" id="card">
            <div class="glow-effect"></div>
            
            <div class="card-header">
                <div class="rating-badge">
                    <span id="cardRating">102</span>
                </div>
                <div class="playstyle-tag" id="cardPlaystyle">QUICK COUNTER</div>
            </div>

            <div class="card-body">
                <div class="squad-title" id="cardSquad">SQUAD NAME</div>
                <div class="manager-name" id="cardName">MANAGER NAME</div>
            </div>

            <div class="card-footer">
                <div class="efootball-logo">eFootball™ 2026</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
