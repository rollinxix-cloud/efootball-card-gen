<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball 2026 Tournament Card Creator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="app-container">
        <h1>eFootball 2026 Squad Engine</h1>
        
        <div class="controls">
            <input type="text" id="nameInput" placeholder="Gamer / Player Name" oninput="updateCard()">
            <input type="number" id="ratingInput" placeholder="Overall Rating (e.g., 105)" oninput="updateCard()">
            <input type="text" id="yearInput" placeholder="Season / Edition (e.g., 2026/27)" oninput="updateCard()">
            
            <label class="control-label">Card Style Design</label>
            <select id="cardTypeInput" onchange="updateCard()">
                <option value="epic">✨ Epic / Big Time (Gold & Green Glow)</option>
                <option value="trending">🔥 Trending / Show Time (Neon Red & Orange)</option>
                <option value="standard">⚡ Standard Pro (Deep Blue Cyber)</option>
            </select>

            <label class="control-label">Card Rarity Tier</label>
            <select id="starsInput" onchange="updateCard()">
                <option value="5">⭐⭐⭐⭐⭐ (5 Stars)</option>
                <option value="4">⭐⭐⭐⭐ (4 Stars)</option>
                <option value="3">⭐⭐⭐ (3 Stars)</option>
                <option value="2">⭐⭐ (2 Stars)</option>
                <option value="1">⭐ (1 Star)</option>
            </select>
            
            <label class="control-label">Upload Player Photo (Auto-Blends)</label>
            <input type="file" id="imageLoader" accept="image/*" onchange="handleImageUpload(event)">
            
            <button onclick="downloadCard()">Download Card Asset</button>
        </div>

        <div class="card epic" id="card">
            <div class="cyber-background"></div>
            <div class="laser-lines"></div>
            <div class="vignette-shadow"></div>
            
            <div class="player-frame">
                <img id="cardPlayerImg" class="player-graphic" src="" alt="">
            </div>

            <div class="rating-badge">
                <span id="cardRating">105</span>
            </div>
            
            <div class="card-details">
                <div class="season-year" id="cardYear">2026/27</div>
                <div class="player-name" id="cardName">BINAYA SHRESTHA</div>
            </div>

            <div class="podium-pedestal">
                <div class="podium-content">
                    <div class="efootball-logo-sphere">e</div>
                    <div class="stars-row" id="cardStars">⭐⭐⭐⭐⭐</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
